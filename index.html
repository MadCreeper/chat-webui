<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: #fff;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 18px; color: #333; }
    .header-actions button {
      padding: 6px 12px;
      margin-left: 8px;
      border: 1px solid #e5e5e5;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .header-actions button:hover { background: #f5f5f5; }
    .header-actions button.danger { color: #e53935; border-color: #e53935; }

    /* Chat Container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    /* Messages */
    .message {
      display: flex;
      margin-bottom: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { justify-content: flex-end; }
    .message.ai { justify-content: flex-start; }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai .message-bubble {
      background: #fff;
      color: #333;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }

    .message .meta {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    .message.user .meta { text-align: right; }

    /* Typing indicator */
    .typing {
      display: flex;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      margin-bottom: 20px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(1) { animation-delay: 0s; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input Area */
    #input-area {
      background: #fff;
      padding: 16px 20px;
      border-top: 1px solid #e5e5e5;
    }
    #input-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    #message-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      resize: none;
      font-family: inherit;
      max-height: 120px;
    }
    #message-input:focus { outline: none; border-color: #2563eb; }
    #send-btn {
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    /* Settings Modal */
    #settings-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #settings-modal.show { display: flex; }
    .modal-content {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }
    .modal-content h2 { margin-bottom: 16px; font-size: 18px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #666; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 14px;
    }
    .form-group input:focus { outline: none; border-color: #2563eb; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-actions button {
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .modal-actions .cancel { background: #fff; border: 1px solid #e5e5e5; }
    .modal-actions .save { background: #2563eb; color: #fff; border: none; }
    .modal-actions .save:hover { background: #1d4ed8; }

    /* Token Stats */
    #token-stats {
      font-size: 12px;
      color: #666;
      padding: 8px 20px;
      background: #fafafa;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: #999;
      padding: 60px 20px;
    }
    .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h1>💬 Chat</h1>
    <div class="header-actions">
      <button onclick="showSettings()">设置</button>
      <button class="danger" onclick="clearChat()">清空</button>
    </div>
  </header>

  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <h2>还没有消息</h2>
      <p>开始对话吧</p>
    </div>
  </div>

  <div id="token-stats"></div>

  <div id="input-area">
    <div id="input-container">
      <textarea id="message-input" placeholder="输入消息..." rows="1" onkeydown="handleKeydown(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="modal-content">
      <h2>API 设置</h2>
      <div class="form-group">
        <label>API 端点 (URL)</label>
        <input type="text" id="api-url" placeholder="https://api.example.com/v1/chat/completions">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型名称</label>
        <input type="text" id="model-name" placeholder="gpt-4o">
      </div>
      <div class="modal-actions">
        <button class="cancel" onclick="hideSettings()">取消</button>
        <button class="save" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // State
    const STORAGE_KEY = 'chat_messages';
    const SETTINGS_KEY = 'chat_settings';
    let messages = [];
    let settings = {
      apiUrl: '',
      apiKey: '',
      model: 'gpt-4o'
    };
    let tokenUsage = { prompt: 0, completion: 0, total: 0 };

    // Load from localStorage
    function loadData() {
      const savedMessages = localStorage.getItem(STORAGE_KEY);
      const savedSettings = localStorage.getItem(SETTINGS_KEY);

      if (savedMessages) messages = JSON.parse(savedMessages);
      if (savedSettings) settings = { ...settings, ...JSON.parse(savedSettings) };

      renderMessages();
      updateTokenStats();
      loadSettingsToModal();
    }

    // Save to localStorage
    function saveMessages() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    function saveSettingsToStorage() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    // Render messages
    function renderMessages() {
      const container = document.getElementById('chat-container');
      const emptyState = document.getElementById('empty-state');

      if (messages.length === 0) {
        emptyState.style.display = 'block';
        container.querySelectorAll('.message').forEach(m => m.remove());
        return;
      }

      emptyState.style.display = 'none';

      // Clear existing messages
      container.querySelectorAll('.message').forEach(m => m.remove());

      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.role}`;
        div.innerHTML = `
          <div class="message-bubble">
            ${escapeHtml(msg.content)}
            ${msg.tokens ? `<div class="meta">${msg.tokens} tokens</div>` : ''}
          </div>
        `;
        container.appendChild(div);
      });

      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content) return;

      // Check settings
      if (!settings.apiUrl || !settings.apiKey) {
        alert('请先配置API设置');
        showSettings();
        return;
      }

      // Add user message
      messages.push({ role: 'user', content });
      saveMessages();
      renderMessages();

      input.value = '';
      input.style.height = 'auto';

      // Show typing indicator
      const container = document.getElementById('chat-container');
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing-indicator';
      typing.innerHTML = '<span></span><span></span><span></span>';
      container.appendChild(typing);
      container.scrollTop = container.scrollHeight;

      // Disable send button
      document.getElementById('send-btn').disabled = true;

      try {
        const response = await fetch(settings.apiUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${settings.apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: settings.model,
            messages: messages.slice(-20).map(m => ({ role: m.role, content: m.content })),
            stream: false
          })
        });

        if (!response.ok) {
          throw new Error(`API错误: ${response.status}`);
        }

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || '无回复';

        // Extract token usage if available
        const usage = data.usage;
        if (usage) {
          tokenUsage.prompt += usage.prompt_tokens || 0;
          tokenUsage.completion += usage.completion_tokens || 0;
          tokenUsage.total += usage.total_tokens || 0;
          updateTokenStats();
        }

        messages.push({ role: 'assistant', content: reply });
        saveMessages();
        renderMessages();

      } catch (error) {
        alert('错误: ' + error.message);
        messages.push({ role: 'assistant', content: '❌ 请求失败: ' + error.message });
        saveMessages();
        renderMessages();
      } finally {
        document.getElementById('typing-indicator')?.remove();
        document.getElementById('send-btn').disabled = false;
      }
    }

    // Handle Enter key
    function handleKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Auto-resize textarea
    document.getElementById('message-input').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Settings modal
    function showSettings() {
      loadSettingsToModal();
      document.getElementById('settings-modal').classList.add('show');
    }

    function hideSettings() {
      document.getElementById('settings-modal').classList.remove('show');
    }

    function loadSettingsToModal() {
      document.getElementById('api-url').value = settings.apiUrl;
      document.getElementById('api-key').value = settings.apiKey;
      document.getElementById('model-name').value = settings.model;
    }

    function saveSettings() {
      settings.apiUrl = document.getElementById('api-url').value.trim();
      settings.apiKey = document.getElementById('api-key').value.trim();
      settings.model = document.getElementById('model-name').value.trim() || 'gpt-4o';

      saveSettingsToStorage();
      hideSettings();
      alert('设置已保存');
    }

    // Clear chat
    function clearChat() {
      if (confirm('确定要清空所有聊天记录吗？')) {
        messages = [];
        tokenUsage = { prompt: 0, completion: 0, total: 0 };
        saveMessages();
        updateTokenStats();
        renderMessages();
      }
    }

    // Token stats
    function updateTokenStats() {
      const stats = document.getElementById('token-stats');
      stats.textContent = `Tokens: ${tokenUsage.total.toLocaleString()} (Prompt: ${tokenUsage.prompt.toLocaleString()} | Completion: ${tokenUsage.completion.toLocaleString()})`;
    }

    // Initialize
    loadData();
  </script>
</body>
</html>
